AWSTemplateFormatVersion: '2010-09-09'
Description: 'Adim 2: Docker Imajini Build Eden CodeBuild Projesi'

Parameters:
  # GitHub repo adresini buraya yaziyoruz
  GithubRepoUrl:
    Type: String
    Default: 'https://github.com/iamseyhmus7/aws-codebuild-pipeline-simple-python'
  
  # Birinci adimdaki CloudFormation yigininin (Stack) ismini buraya yazmalisin
  RolesStackName:
    Type: String
    Default: 'Benim-CICD-Rollerim'

Resources:
  IsciProjesi:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${AWS::StackName}-Isci"
      Description: 'Flask uygulamasi icin Docker imaji olusturan isci'
      
      # ÖNEMLİ: Birinci adimda olusturdugumuz yaka kartini (Role) buradan cagiriyoruz
      ServiceRole: !ImportValue 
        Fn::Sub: "${RolesStackName}-CodeBuildRoleArn"
      
      Artifacts:
        Type: NO_ARTIFACTS # Pipeline kullanacagimiz icin simdilik artifacts yok
      
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0 # En guncel Ubuntu imaji (Python 3.11 icerir)
        
        # KRİTİK AYAR: Docker komutlarini (docker build) calistirabilmek icin bu SART!
        PrivilegedMode: true 
        
      Source:
        Type: GITHUB
        Location: !Ref GithubRepoUrl
        BuildSpec: buildspec.yml # Repondaki buildspec dosyasini oku diyoruz
      
      TimeoutInMinutes: 15

Outputs:
  ProjectName:
    Value: !Ref IsciProjesi
    Export:
      Name: !Sub "${AWS::StackName}-ProjectName"